name: Release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  macos-app:
    name: Build macOS app artifact
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install --frozen-lockfile
      - name: Build app bundle
        run: bash scripts/build-app.sh
      - name: Zip app
        run: ditto -c -k --keepParent dist/Multiharness.app Multiharness-macOS.zip
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Multiharness-macOS
          path: Multiharness-macOS.zip
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Multiharness-macOS.zip
          generate_release_notes: true
