name: MultiharnessIOS
options:
  bundleIdPrefix: com.multiharness
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.multiharness.ios
    GENERATE_INFOPLIST_FILE: NO
packages:
  Multiharness:
    path: ..
targets:
  MultiharnessIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      gatherCoverageData: false
      runWithoutBuilding: false
      testTargets: []
    sources:
      - path: Sources/MultiharnessIOS
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Multiharness
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: Multiharness uses your local network to discover and connect to a paired Mac running Multiharness.
        NSCameraUsageDescription: Multiharness uses the camera to scan the QR code shown by the Mac during pairing.
        NSBonjourServices:
          - _multiharness._tcp
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - package: Multiharness
        product: MultiharnessClient
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        PRODUCT_NAME: MultiharnessIOS
        PRODUCT_BUNDLE_IDENTIFIER: com.multiharness.ios
